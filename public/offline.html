<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>타비톡 - 오프라인</title>
    <style>
      body { font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #fdf2f8; color: #1f2937; text-align: center; padding: 2rem; }
      h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
      p { color: #6b7280; font-size: 0.875rem; max-width: 320px; }
      .icon { font-size: 3rem; margin-bottom: 1rem; }
      button { margin-top: 1.5rem; padding: 0.75rem 1.5rem; border-radius: 0.75rem; border: none; background: #e8a0bf; color: white; font-weight: 600; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="icon">✈️</div>
    <h1>오프라인 상태입니다</h1>
    <p>인터넷 연결이 필요합니다. 네트워크가 복구되면 자동으로 연결됩니다.</p>
    <button onclick="location.reload()">다시 시도</button>
  </body>
</html>
